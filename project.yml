name: LAYTEKS
options:
  bundleIdPrefix: com.layteks
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

targets:
  LAYTEKS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LAYTEKS
        excludes:
          - "Rendering/katex.min.js"
          - "Rendering/katex.min.css"
          - "Rendering/katex-render.html"
          - "Rendering/fonts/**"
          - "**/.DS_Store"
      - path: LAYTEKS/Rendering/katex-render.html
        buildPhase: resources
      - path: LAYTEKS/Rendering/katex.min.js
        buildPhase: resources
      - path: LAYTEKS/Rendering/katex.min.css
        buildPhase: resources
      - path: LAYTEKS/Rendering/fonts
        buildPhase: resources
        type: folder
    info:
      path: LAYTEKS/Info.plist
      properties:
        CFBundleDisplayName: LAYTEKS
        CFBundleName: LAYTEKS
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.layteks.app
        SWIFT_VERSION: "5.10"
        CODE_SIGN_STYLE: Automatic

  LAYTEKSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LAYTEKSTests
    dependencies:
      - target: LAYTEKS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.layteks.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  LAYTEKS:
    build:
      targets:
        LAYTEKS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LAYTEKSTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="katex.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: transparent;
      color: #E0E0FF;
      font-family: -apple-system, sans-serif;
      padding: 20px;
      font-size: 18px;
      user-select: text;
      -webkit-user-select: text;
      word-wrap: break-word;
    }
    #output { min-height: 40px; line-height: 2.0; }
    #output > * + * { margin-top: 14px; }
    .katex-display { overflow-x: auto; padding: 4px 0; }
    .doc-heading {
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .doc-paragraph,
    .doc-list {
      font-size: 16px;
      line-height: 1.7;
    }
    .doc-list {
      padding-left: 20px;
    }
    .doc-list li + li {
      margin-top: 6px;
    }
    .doc-code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.95em;
      padding: 1px 5px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
    }
    .error-block {
      color: #FF6B6B;
      font-size: 13px;
      font-family: monospace;
      background: rgba(255, 107, 107, 0.1);
      padding: 10px 14px;
      border-radius: 8px;
      border-left: 3px solid #FF6B6B;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
  <script src="katex.min.js"></script>
</head>
  <body>
  <div id="output"></div>
  <script>
    var showErrors = true;

    function notifyError(message) {
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.katexError) {
        window.webkit.messageHandlers.katexError.postMessage(message);
      }
    }

    function renderMathToString(source, displayMode) {
      return katex.renderToString(source, {
        displayMode: displayMode,
        throwOnError: true,
        trust: false,
        strict: false
      });
    }

    function renderMathError(message) {
      if (!showErrors) {
        return '';
      }
      return '<div class="error-block">' + escapeHtml(message) + '</div>';
    }

    function tryRenderMath(source, displayMode) {
      try {
        return renderMathToString(source, displayMode);
      } catch (e) {
        notifyError(e.message);
        return renderMathError(e.message);
      }
    }

    function formatPlainText(text) {
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, '<code class="doc-code">$1</code>')
        .replace(/\n/g, '<br>');
    }

    function findClosingDollar(text, startIndex) {
      for (var i = startIndex; i < text.length; i++) {
        if (text[i] === '$' && text[i - 1] !== '\\') {
          return i;
        }
      }
      return -1;
    }

    function renderInlineContent(text) {
      var result = '';
      var buffer = '';
      var i = 0;

      while (i < text.length) {
        if (text[i] === '\\' && i + 1 < text.length && text[i + 1] === '$') {
          buffer += '$';
          i += 2;
          continue;
        }

        if (text[i] === '$') {
          var closing = findClosingDollar(text, i + 1);
          if (closing !== -1) {
            result += formatPlainText(buffer);
            buffer = '';

            var mathSource = text.slice(i + 1, closing).trim();
            result += mathSource ? tryRenderMath(mathSource, false) : '$$';
            i = closing + 1;
            continue;
          }
        }

        buffer += text[i];
        i += 1;
      }

      result += formatPlainText(buffer);
      return result;
    }

    function looksLikeBareLatex(block) {
      return /\\[A-Za-z]+|[_^{}]|\\begin\{|\\end\{|\\frac|\\sum|\\int|\\sqrt|=/.test(block);
    }

    function renderBlock(block) {
      var headingMatch = block.match(/^(#{1,6})\s+(.+)$/);
      if (headingMatch) {
        var level = headingMatch[1].length;
        var headingContent = renderInlineContent(headingMatch[2].trim());
        return '<h' + level + ' class="doc-heading">' + headingContent + '</h' + level + '>';
      }

      if ((block.startsWith('$$') && block.endsWith('$$')) || (block.startsWith('\\[') && block.endsWith('\\]'))) {
        var blockMath = block.startsWith('$$')
          ? block.slice(2, -2).trim()
          : block.slice(2, -2).trim();
        return tryRenderMath(blockMath, true);
      }

      var listLines = block.split('\n');
      if (listLines.every(function(line) { return /^[-*]\s+/.test(line); })) {
        var listItems = listLines.map(function(line) {
          return '<li>' + renderInlineContent(line.replace(/^[-*]\s+/, '')) + '</li>';
        }).join('');
        return '<ul class="doc-list">' + listItems + '</ul>';
      }

      if (looksLikeBareLatex(block)) {
        return tryRenderMath(block, true);
      }

      return '<p class="doc-paragraph">' + renderInlineContent(block) + '</p>';
    }

    function renderDocument(source) {
      return source
        .split(/\n\s*\n/)
        .map(function(block) { return block.trim(); })
        .filter(function(block) { return block.length > 0; })
        .map(renderBlock)
        .join('');
    }

    function renderKaTeX(source, options) {
      if (options && options.showErrors !== undefined) {
        showErrors = options.showErrors;
      }
      var output = document.getElementById('output');
      if (!source || source.trim() === '') {
        output.innerHTML = '';
        return;
      }

      var trimmed = source.trim();

      try {
        katex.render(trimmed, output, {
          displayMode: true,
          throwOnError: true,
          trust: false,
          strict: false
        });
      } catch (e) {
        var renderedDocument = renderDocument(trimmed);
        if (renderedDocument.length > 0) {
          output.innerHTML = renderedDocument;
          return;
        }

        output.innerHTML = renderMathError(e.message);
        notifyError(e.message);
      }
    }

    function setTheme(backgroundColor, textColor) {
      document.body.style.backgroundColor = backgroundColor;
      document.body.style.color = textColor;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
